model:
  name: "SER"
  encoder: "google-bert/bert-base-cased"
  architecture: "SynonymModel"
  wrapper: "ScoredSynonymModel"
  hidden_sizes:
    - 50
  d_attn: 768
  drop_attn: 0.4
  drop_cls: 0.3
  fine_tune: false
  max_len: 512

data:
  root_dir: "."
  train_data: "data/train_ft.json"
  val_data: "data/dev_ft.json"
  input_tags:
    - "source"
    - "homonym"
    - "target"
  label_tag: "probs"
  metric_tag: "interval"

training:
  # Pretrained Model Path
  prev_path: null  # Use null for training from scratch, or path/repo for fine-tuning
  task: "finetuning"
  
  # Training Parameters
  train_batch_size: 64
  epochs: 100
  warmup_ratio: 0.05
  scheduler_type: "cosine"  # Options: linear, cosine, constant
  
  # Loss Function Configuration
  loss_type: "KLDivLoss"
  loss_betas:
    - 0.7
    - 0.999
  loss_reduction: "mean"
  masking: 1
  
  # Learning Rate and Weight Decay
  
# Learning Rate and Weight Decay
  param_groups:
    encoder:
      layers:
        - model.model
      lr: !!float 1e-5
      weight_decay: 0.1
    attn:
      layers:
        - K
        - Q
        - V
      lr: !!float 5e-5
      weight_decay: 0.1
  lr_others: !!float 3e-5
  weight_decay_other: 0.01  
 
      
  # Checkpoint Management
  save_total_limit: 3  # Maximum number of checkpoints to save
  
  # Advanced Training Settings
  size_sup: -1
  shuffle: true
  random_drop: true
  
  freeze_components:
    0:
      freeze:
        - base_model
      unfreeze: []
    1:
      freeze: []
      unfreeze:
        - K
        - V
        - Q
    2:
      freeze: []
      unfreeze:
        - encoder
