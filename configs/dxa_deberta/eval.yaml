model:
  # Model Configuration
  name: "DXA"
  encoder: "microsoft/deberta-v3-base" # Hugging Face model
  architecture: "GeneralistModel"
  wrapper: "GeneralistModelScored"
  huggingface: False
  d_attn: 768
  hidden_sizes:
    - 50
  drop_attn: 0.4
  drop_cls: 0.3
  max_len: 512

data:
  # Directory Paths
  data: "data/test.json"
  output: "output/"
  input_tags:
    - "full_context"
    - "example_sentence"
  label_tag: "average"


evaluation:
  # Pretrained Model Path and Task
  prev_path: "checkpoint/ft-DXA_deberta-v3-base/20260130_143441/ft-DXA_deberta-v3-base_2.safetensors"
  task: "eval"
