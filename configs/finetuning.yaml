model:
  # Model Configuration
  model_name: microsoft/deberta-v3-small # Hugging Face model
  encoder: microsoft/deberta-v3-small # Hugging Face model
  name: ""
  max_width: 12
  hidden_size: 768
  drop_attn: 0.3
  drop_cls: 0.4
  fine_tune: false
  max_len: 512
  max_neg_type_ratio: 1

data:
  # Directory Paths
  root_dir: "none"
  train_data: "data/pretraining/train_augmented.json"
  val_data: "data/pretraining/dev_augmented.json"
  input_tags:
    - "source"
    - "target"
  label_tag: "mask"
  metric_tag: "mask"


training:
  # Pretrained Model Path
  prev_path: null  # Use null for training from scratch, or path/repo for fine-tuning
  
  # Training Parameters
  train_batch_size: 64
  warmup_ratio: 0.05
  scheduler_type: "cosine"  # Options: linear, cosine, constant
  
  # Loss Function Configuration
  loss_betas:
    - 0.7
    - 0.999
  loss_reduction: "mean"
  masking: 1
  
  # Learning Rate and Weight Decay
  lr_encoder: 1e-5
  lr_others: 3e-5
  weight_decay_encoder: 0.1
  weight_decay_other: 0.01
  max_grad_norm: 10.0
  
  # Checkpoint Management
  save_total_limit: 3  # Maximum number of checkpoints to save
  
  # Advanced Training Settings
  size_sup: -1
  shuffle: true
  random_drop: true
  
  freeze_components: ""