model:
  # Model Configuration
  name: "DXA-distilbert"
  encoder: "distilbert/distilbert-base-cased" # Hugging Face model
  architecture: "DXAModel"
  wrapper: "ScoredDXAModel"
  huggingface: False
  d_attn: 768
  hidden_sizes:
    - 50
  drop_attn: 0.4
  drop_cls: 0.3
  max_len: 512

data:
  # Directory Paths
  data: "data/test.json"
  output: "output/"
  input_tags:
    - "full_context"
    - "judged_meaning"
  label_tag: "average"
  eval_tags: {}


evaluation:
  # Pretrained Model Path and Task
  prev_path: "checkpoint/ft-DXA_distilbert-base-cased/20260130_164337/ft-DXA_distilbert-base-cased_2.safetensors"
  task: "eval"
