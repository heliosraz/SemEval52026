model:
  # Model Configuration
  name: "DXA-bert"
  encoder: "distilbert/distilbert-base-cased" # Hugging Face model
  architecture: "GeneralistModel"
  wrapper: "GeneralistModelScored"
  hidden_sizes:
    - 50
  d_attn: 768
  drop_attn: 0.4
  drop_cls: 0.3
  fine_tune: false
  max_len: 512


data:
  # Directory Paths
  root_dir: "none"
  train_data: "data/train_augmented.json"
  val_data: "data/dev_augmented.json"
  input_tags:
    - "source"
    - "target"
  label_tag: "probs"
  metric_tag: "interval"


training:
  # Pretrained Model Path
  prev_path: "checkpoint/DXA_distilbert-base-cased/20260128_084901/DXA_distilbert-base-cased_2.safetensors"  # Use null for training from scratch, or path/repo for fine-tuning
  task: "classifier-ft"
  
  # Training Parameters
  train_batch_size: 64
  epochs: 100
  warmup_ratio: 0.05
  scheduler_type: "cosine"  # Options: linear, cosine, constant
  
  # Loss Function Configuration
  loss_type: "KLDivLoss"
  loss_betas:
    - 0.7
    - 0.999
  loss_reduction: "batchmean"
  masking: 1
  
  # Learning Rate and Weight Decay
  param_groups:
    encoder:
      layers:
        - model.model
      lr: !!float 1e-5
      weight_decay: 0.1
    attn:
      layers:
        - K
        - Q
        - V
      lr: !!float 5e-5
      weight_decay: 0.1
  lr_others: !!float 3e-5
  weight_decay_encoder: 0.1
  weight_decay_other: 0.01
  
  # Checkpoint Management
  save_total_limit: 3  # Maximum number of checkpoints to save
  
  # Advanced Training Settings
  size_sup: -1
  shuffle: true
  random_drop: true
  
  freeze_components:
    0:
      freeze:
        - base_model
      unfreeze: []
    50:
      freeze: []
      unfreeze:
        - K
        - V
        - Q
    75:
      freeze: []
      unfreeze:
        - encoder
