model:
  # Model Configuration
  name: "DXA"
  encoder: "distilbert/distilbert-base-cased" # Hugging Face model
  architecture: "GeneralistModel"
  wrapper: "GeneralistModelScored"
  huggingface: False
  d_attn: 768
  hidden_sizes:
    - 50
  drop_attn: 0.4
  drop_cls: 0.3
  max_len: 512

data:
  # Directory Paths
  data: "data/dev.json"
  output: "output/"
  input_tags:
    - "full_context"
    - "example_sentence"
  label_tag: "average"


evaluation:
  # Pretrained Model Path and Task
  prev_path: "checkpoint/ft-DXA_distilbert-base-cased/20260129_104931/ft-DXA_distilbert-base-cased_2.safetensors"
  task: "eval"
