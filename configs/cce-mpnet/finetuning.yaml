model:
  # Model Configuration
  name: "ft-CCE"
  encoder: "sentence-transformers/all-mpnet-base-v2" # Hugging Face model
  architecture: "CrossContextSimilarityModule"
  huggingface: False
  wrapper: ~
  d_attn: ~
  drop_attn: ~
  drop_cls: 0.3
  fine_tune: False
  max_len: 512


data:
  # Directory Paths
  root_dir: "none"
  train_data: "data/train_ft.json"
  val_data: "data/dev_ft.json"
  input_tags:
    - "source"
    - "target"
  label_tag: "probs"
  metric_tag: "interval"


training:
  # Pretrained Model Path
  prev_path: "top_models/cce-all-mpnet-base-v2.safetensors"  # Use null for training from scratch, or path/repo for fine-tuning
  task: "finetuning"
  
  # Training Parameters
  train_batch_size: 64
  epochs: 100
  warmup_ratio: 0.05
  scheduler_type: "cosine"  # Options: linear, cosine, constant
  
  # Loss Function Configuration
  loss_type: "KLDivLoss"
  loss_betas:
    - 0.7
    - 0.999
  loss_reduction: "batchmean"
  masking: 0
  
  # Learning Rate and Weight Decay
  param_groups:
    encoder:
      layers:
        - context_former
        - sentence_former
      lr: !!float 1e-5
      weight_decay: 0.1
  lr_others: !!float 3e-5
  weight_decay_other: 0.01
  
  # Checkpoint Management
  save_total_limit: 3  # Maximum number of checkpoints to save
  
  freeze_components:
    !!int 0:
      freeze:
        - auto_model
      unfreeze:
        - lora
