model:
  # Model Configuration
  name: "CCE"
  encoder: "sentence-transformers/all-mpnet-base-v2" # Hugging Face model
  architecture: "CrossContextSimilarityModule"
  huggingface: False
  wrapper: ~
  d_attn: ~
  drop_attn: ~
  drop_cls: ~
  fine_tune: False
  max_len: 512


data:
  # Directory Paths
  data: "data/test.json"
  output: "output/"
  input_tags:
    - "full_context"
    - "example_sentence"
  label_tag: "average"


evaluation:
  # Pretrained Model Path and Task
  prev_path: "checkpoint/ft-CCE_all-mpnet-base-v2/20260129_181137/ft-CCE_all-mpnet-base-v2_2.safetensors"
  task: "eval"
